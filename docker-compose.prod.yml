services:
  mysql:
    image: mysql:8.4
    container_name: quantmate-prod-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-quantmate-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-quantmate}
      MYSQL_USER: ${MYSQL_USER:-quantmate}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-quantmate}
      TZ: Asia/Seoul
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --default-time-zone=+09:00
    volumes:
      - ${QM_MYSQL_DATA_PATH:-./runtime/mysql}:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  backend:
    build:
      context: ./backend
    container_name: quantmate-prod-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_TIMEZONE: Asia/Seoul
      DATABASE_URL: mysql+pymysql://${MYSQL_USER:-quantmate}:${MYSQL_PASSWORD:-quantmate}@mysql:3306/${MYSQL_DATABASE:-quantmate}
      KIS_TOKEN_CACHE_PATH: /app/runtime/kis_token_cache.json
      KIS_WS_APPROVAL_CACHE_PATH: /app/runtime/kis_ws_approval_cache.json
      OPEN_DART_CORP_CODE_CACHE_PATH: /app/runtime/opendart_corp_codes.json
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ${QM_BACKEND_RUNTIME_PATH:-./runtime/backend}:/app/runtime
      - ${QM_BACKEND_LOG_PATH:-./runtime/logs/backend}:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
    container_name: quantmate-prod-frontend
    restart: unless-stopped
    environment:
      PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL:-http://127.0.0.1:8000}
      PUBLIC_SHOW_PAPER_TRADING_UI: ${PUBLIC_SHOW_PAPER_TRADING_UI:-true}
      HOST: 0.0.0.0
      PORT: 5173
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:5173 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
