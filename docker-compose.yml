services:
  mysql:
    image: mysql:8.4
    container_name: quantmate-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-quantmate-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-quantmate}
      MYSQL_USER: ${MYSQL_USER:-quantmate}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-quantmate}
      TZ: Asia/Seoul
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --default-time-zone=+09:00
      # 로컬은 데이터가 적어 성능 영향은 거의 없지만 운영(384M)과 설정 일관성 유지용.
      - --innodb-buffer-pool-size=256M
    volumes:
      - quantmate_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  quantmate_mysql_data:

